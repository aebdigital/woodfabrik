    <!-- Main JavaScript -->
    <script type="module" src="../js/main.js?v=6.0"></script>
    <!-- Fallback script -->
    <script>
        // Portfolio filtering functionality
        document.addEventListener('DOMContentLoaded', function () {
            // Animate portfolio h1 on page load
            const portfolioH1 = document.querySelector('.hero-portfolio h1');
            if (portfolioH1) {
                setTimeout(() => {
                    portfolioH1.classList.add('animate');
                }, 100);

                setTimeout(() => {
                    portfolioH1.classList.add('fill-animate');
                }, 800);
            }

            // Portfolio filter functionality
            const filterButtons = document.querySelectorAll('.filter-btn');
            const portfolioItems = document.querySelectorAll('.portfolio-item');

            // Function to filter items
            function filterItems(filterValue) {
                portfolioItems.forEach(item => {
                    // Reset all items to block first
                    item.style.display = 'block';

                    // Then apply filter
                    if (filterValue !== 'all' && item.getAttribute('data-category') !== filterValue) {
                        item.style.display = 'none';
                    }
                });
            }

            // Initialize with kuchyne filter on page load
            setTimeout(() => {
                filterItems('kuchyne');
            }, 0);

            filterButtons.forEach(button => {
                button.addEventListener('click', function () {
                    // Remove active class from all buttons
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    // Add active class to clicked button
                    this.classList.add('active');

                    const filterValue = this.getAttribute('data-filter');
                    filterItems(filterValue);
                });
            });

            // Lightbox functionality
            if (!window.openLightbox) {
                window.openLightbox = function (img) {
                    const lightbox = document.getElementById('lightbox');
                    const lightboxImage = document.getElementById('lightbox-image');
                    lightboxImage.src = img.src;
                    lightboxImage.alt = img.alt;
                    lightbox.style.display = 'flex';
                    currentImageIndex = Array.from(portfolioItems).findIndex(item =>
                        item.querySelector('img') === img && item.style.display !== 'none'
                    );
                };

                window.closeLightbox = function () {
                    document.getElementById('lightbox').style.display = 'none';
                };

                window.nextImage = function () {
                    const visibleItems = Array.from(portfolioItems).filter(item =>
                        item.style.display !== 'none'
                    );
                    currentImageIndex = (currentImageIndex + 1) % visibleItems.length;
                    const nextImg = visibleItems[currentImageIndex].querySelector('img');
                    document.getElementById('lightbox-image').src = nextImg.src;
                    document.getElementById('lightbox-image').alt = nextImg.alt;
                };

                window.previousImage = function () {
                    const visibleItems = Array.from(portfolioItems).filter(item =>
                        item.style.display !== 'none'
                    );
                    currentImageIndex = (currentImageIndex - 1 + visibleItems.length) % visibleItems.length;
                    const prevImg = visibleItems[currentImageIndex].querySelector('img');
                    document.getElementById('lightbox-image').src = prevImg.src;
                    document.getElementById('lightbox-image').alt = prevImg.alt;
                };
            }

            let currentImageIndex = 0;

            // Close lightbox on escape key
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    closeLightbox();
                }
            });

            // Close lightbox when clicking outside image
            document.getElementById('lightbox').addEventListener('click', function (e) {
                if (e.target === this) {
                    closeLightbox();
                }
            });
        });
    </script>
