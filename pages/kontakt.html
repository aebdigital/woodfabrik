    <!-- Contact Content Section -->

                <div class="contact-info-left">

                        </div>

                            </div>
                        </div>

                        <div class="contact-detail-item">
                            <div class="contact-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2"/>

                                </svg>

                    </div>

                    <div class="company-registration">
                        <h4>Obchodné údaje</h4>
                        <div class="registration-details">
                            <p><strong>Názov:</strong> Woodfabrik s.r.o.</p>
                            <p><strong>IČO:</strong> 50151576</p>
                            <p><strong>DIČ:</strong> 2120196463</p>

                    </div>

                <!-- Contact Form Right -->
                <div class="contact-form-right">
                    <h3>Napíšte nám správu</h3>
                    <p class="form-description">Vyplňte formulár a ozveme sa vám čo najskôr.</p>
                    <form class="contact-form-new" id="contact-form" name="contact" method="POST" action="/.netlify/functions/contact">
                        <div hidden aria-hidden="true">
                            <label>Nevypĺňajte toto pole: <input name="bot-field"></label>
                        </div>
                        <div class="form-group">
                            <input type="text" name="name" placeholder="Vaše meno *" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" placeholder="Váš email *" required>
                        </div>
                        <div class="form-group">
                            <input type="tel" name="phone" placeholder="Váš telefón">
                        </div>
                        <div class="form-group">
                            <input type="text" name="subject" placeholder="Predmet správy">
                        </div>
                        <div class="form-group">
                            <textarea name="message" placeholder="Vaša správa *" rows="6" required></textarea>
                        </div>
                        <div class="form-checkbox">
                            <input type="checkbox" id="privacy-checkbox" required>
                            <label for="privacy-checkbox">Súhlasím s <a href="#" onclick="openPrivacyPopup(); return false;" class="privacy-link">ochranou osobných údajov</a>.</label>
                        </div>
                        <button type="submit" class="form-submit-btn">Odoslať správu</button>
                        <div id="form-message" class="form-message" style="display: none;"></div>
                    </form>
                </div>
